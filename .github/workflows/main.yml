name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build application
        run: npm run build

      - name: Production boot smoke test (Railway-like, no Supabase env)
        run: |
          set -euo pipefail
          env -i PATH="$PATH" HOME="$HOME" NODE_ENV=production PORT=3999 node dist/index.cjs &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:3999/api/public-config" >/tmp/public-config.json; then
              grep -q '"ok":true' /tmp/public-config.json
              echo "Production boot OK (public-config returned ok: true)"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not respond on /api/public-config within 30s"
          exit 1

      - name: Security audit
        run: npm audit --omit=dev
